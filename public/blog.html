<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — LineDecor</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-hero { background: var(--dark); color: var(--cream); padding: 100px 80px 60px; text-align: center; }
    .page-hero h1 { font-family: var(--ff-head); font-size: clamp(2rem, 3.5vw, 3rem); font-weight: 300; }
    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 28px; max-width: 1100px; margin: 0 auto; padding: 60px 40px; }
    .blog-card { background: var(--white); border: 1px solid var(--sand); overflow: hidden; transition: all .25s; }
    .blog-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
    .blog-card-img { height: 180px; background: var(--cream); display: flex; align-items: center; justify-content: center; font-size: 4rem; }
    .blog-card-body { padding: 24px; }
    .blog-card h3 { font-family: var(--ff-head); font-size: 1.2rem; margin-bottom: 10px; color: var(--dark); }
    .blog-card p { font-size: 13px; color: var(--warm); line-height: 1.7; }
    .blog-empty { text-align: center; padding: 80px 24px; color: var(--warm); }
  </style>
</head>
<body>
  <nav id="navbar" class="scrolled">
    <a class="nav-logo" href="index.html">Line<span>Decor</span></a>
    <div class="nav-links">
      <a href="index.html">Loja</a>
      <a href="sobre.html">Sobre</a>
      <a href="blog.html">Blog</a>
      <a href="contato.html">Contato</a>
    </div>
    <a href="index.html" class="btn btn-dark btn-sm">Ir à Loja</a>
  </nav>
  <section class="page-hero">
    <h1>Blog <em>LineDecor</em></h1>
    <p>Dicas de decoração, tendências e inspirações</p>
  </section>
  <div class="blog-grid" id="blog-list">
    <div class="blog-empty">Carregando...</div>
  </div>
  <footer><div class="footer-bottom" style="padding:40px"><p class="footer-copy">© 2025 LineDecor</p></div></footer>
  <script>
    fetch('http://localhost:3000/api/blog').then(r=>r.json()).then(posts=>{
      const el = document.getElementById('blog-list');
      if (!posts.length) { el.innerHTML = '<div class="blog-empty">Em breve teremos novidades por aqui!</div>'; return; }
      el.innerHTML = posts.map(p=>`
        <article class="blog-card">
          <div class="blog-card-img">${p.imagem ? `<img src="${p.imagem}" alt="" style="width:100%;height:100%;object-fit:cover">` : '📝'}</div>
          <div class="blog-card-body">
            <h3>${p.titulo}</h3>
            <p>${p.resumo || ''}</p>
          </div>
        </article>
      `).join('');
    }).catch(()=>{ document.getElementById('blog-list').innerHTML = '<div class="blog-empty">Em breve teremos novidades!</div>'; });
  </script>
</body>
</html>
